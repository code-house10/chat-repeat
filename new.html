<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .font-arabic { font-family: 'Cairo', sans-serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Smooth tab transitions */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Hide default video controls, we use custom ones */
        video::-webkit-media-controls { display: none !important; }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-200 font-sans flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-800 p-4 shadow-sm flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white p-2 rounded-lg" id="icon-languages"></div>
            <div>
                <h1 class="text-xl font-bold text-white tracking-tight">English Learning Studio</h1>
                <p class="text-xs text-slate-400">Master listening & speaking with YouTube & VTT</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4 text-sm">
            <button id="toggle-translation-btn" class="px-3 py-1.5 rounded-full border transition-colors bg-blue-600/20 border-blue-500 text-blue-400" onclick="toggleTranslation()">
                عربي (Arabic)
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        
        <!-- Left Column: Video & Main Controls -->
        <section class="w-full lg:w-3/5 flex flex-col border-r border-slate-800 relative bg-black">
            
            <!-- Video Container -->
            <div class="relative w-full pb-[56.25%] bg-black shadow-lg">
                <!-- Native HTML5 Video Element -->
                <video id="html5-player" class="absolute top-0 left-0 w-full h-full object-contain cursor-pointer" playsinline crossorigin="anonymous" onclick="togglePlay()">
                    <!-- Open source demo video -->
                    <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4" type="video/mp4">
                    Your browser does not support HTML5 video.
                </video>
                
                <!-- YouTube IFrame Container (Hidden by default) -->
                <div id="yt-player" class="absolute top-0 left-0 w-full h-full hidden"></div>
            </div>

            <!-- Core Controls Section -->
            <div class="bg-slate-900 p-4 border-b border-slate-800 flex flex-col gap-4">
                
                <div class="flex flex-wrap gap-4 items-center justify-between">
                    <div class="flex items-center gap-3">
                        <button id="play-pause-btn" onclick="togglePlay()" class="w-12 h-12 flex justify-center items-center bg-blue-600 hover:bg-blue-500 text-white rounded-full transition-colors shadow-lg shadow-blue-500/20">
                            <!-- Play Icon by default -->
                        </button>
                        
                        <div class="flex items-center bg-slate-800 rounded-lg p-1 border border-slate-700">
                            <span class="px-3 text-xs text-slate-400 font-medium">SPEED</span>
                            <div class="flex gap-1" id="speed-controls">
                                <!-- Speed buttons generated by JS -->
                            </div>
                        </div>
                    </div>

                    <div id="context-controls" class="flex gap-2 hidden">
                        <!-- Loop and Save buttons updated by JS -->
                    </div>
                </div>

                <!-- Media Uploads (YouTube & Local) -->
                <div class="flex flex-col xl:flex-row gap-3">
                    <!-- YouTube Link Input -->
                    <div class="flex flex-1 items-center gap-2 bg-slate-800 p-1.5 rounded-lg border border-slate-700 shadow-inner">
                        <span class="text-[10px] uppercase font-bold text-slate-500 px-2 text-center whitespace-nowrap">YouTube URL</span>
                        <input type="text" id="youtube-link-input" placeholder="Paste link here..." class="w-full bg-transparent text-xs text-white px-2 outline-none placeholder-slate-500" />
                        <button onclick="loadYouTubeVideo()" class="bg-red-600 hover:bg-red-500 text-xs px-3 py-1.5 rounded text-white transition-colors font-medium whitespace-nowrap">Load YT</button>
                    </div>

                    <!-- Local Files for Video & VTT -->
                    <div class="flex flex-1 flex-col sm:flex-row gap-2">
                        <div class="flex flex-1 items-center gap-2 bg-slate-800 p-1.5 rounded-lg border border-slate-700 shadow-inner">
                            <span class="text-[10px] uppercase font-bold text-slate-500 px-2 text-center whitespace-nowrap">Local Video</span>
                            <input type="file" id="local-video-upload" accept="video/mp4,video/webm,video/ogg" class="w-full text-xs text-slate-300 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-slate-700 file:text-slate-300 hover:file:bg-slate-600 cursor-pointer" onchange="loadLocalMedia()" />
                        </div>
                        <div class="flex flex-1 items-center gap-2 bg-slate-800 p-1.5 rounded-lg border border-slate-700 shadow-inner">
                            <span class="text-[10px] uppercase font-bold text-slate-500 px-2 text-center whitespace-nowrap">Subtitles</span>
                            <input type="file" id="local-vtt-upload" accept=".vtt,.srt" class="w-full text-xs text-slate-300 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-slate-700 file:text-slate-300 hover:file:bg-slate-600 cursor-pointer" onchange="loadSubtitlesFile()" />
                        </div>
                    </div>
                </div>

            </div>

            <!-- Current Subtitle Prominent Display -->
            <div id="current-subtitle-container" class="flex-1 p-8 bg-slate-900 flex flex-col justify-center items-center text-center min-h-[200px]">
                <div class="text-slate-500 flex flex-col items-center gap-3">
                    <div id="icon-settings"></div>
                    <p>Play the video to see active subtitles.</p>
                </div>
            </div>
        </section>

        <!-- Right Column: Interactive Sidebar -->
        <section class="w-full lg:w-2/5 flex flex-col bg-slate-950 h-[50vh] lg:h-auto">
            
            <!-- Tabs -->
            <div class="flex border-b border-slate-800 p-2 gap-2 bg-slate-900/50">
                <button id="tab-transcript-btn" onclick="switchTab('transcript')" class="flex-1 py-3 text-sm font-semibold rounded-lg transition-all bg-slate-800 text-blue-400 shadow-sm border border-slate-700">
                    Interactive Transcript
                </button>
                <button id="tab-revision-btn" onclick="switchTab('revision')" class="flex-1 py-3 text-sm font-semibold rounded-lg transition-all flex items-center justify-center gap-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800/50">
                    Revision List <span id="revision-badge" class="bg-emerald-500/20 text-emerald-400 py-0.5 px-2 rounded-full text-xs hidden">0</span>
                </button>
            </div>

            <!-- Content Area -->
            <div class="flex-1 overflow-y-auto p-4 custom-scrollbar relative" id="sidebar-content">
                
                <!-- Transcript Tab -->
                <div id="tab-transcript" class="tab-content active space-y-3">
                    <!-- Transcript generated by JS -->
                </div>

                <!-- Revision Tab -->
                <div id="tab-revision" class="tab-content">
                    <!-- Revision list generated by JS -->
                </div>

            </div>
        </section>
    </main>

    <script>
        // --- Icons (SVG Strings) ---
        const icons = {
            play: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>`,
            pause: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`,
            repeat: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>`,
            bookmark: (filled) => `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="${filled ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>`,
            settings: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>`,
            trash: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`,
            languages: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"></path><path d="m4 14 6-6 2-3"></path><path d="M2 5h12"></path><path d="M7 2h1"></path><path d="m22 22-5-10-5 10"></path><path d="M14 18h6"></path></svg>`,
            sparkles: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>`,
            loader: `<svg class="animate-spin inline" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>`
        };

        const apiKey = ""; // Global API key mapped by environment

        // Inject initial icons
        document.getElementById('icon-languages').innerHTML = icons.languages;
        document.getElementById('icon-settings').innerHTML = icons.settings;
        document.getElementById('play-pause-btn').innerHTML = icons.play;

        // --- State Variables ---
        // Initial fallback subtitles representing a parsed VTT
        let subtitles = [
            { id: 1, start: 0.0, end: 5.5, text: "I am honored to be with you today at your commencement from one of the finest universities in the world.", ar: "أنا فخور بوجودي معكم اليوم في حفل تخرجكم من واحدة من أفضل جامعات العالم." },
            { id: 2, start: 5.5, end: 9.0, text: "I never graduated from college.", ar: "لم أتخرج من الجامعة أبداً." },
            { id: 3, start: 9.0, end: 12.5, text: "Truth be told, this is the closest I've ever gotten to a college graduation.", ar: "في الحقيقة، هذا أقرب شيء وصلت إليه لحفل تخرج جامعي." },
            { id: 4, start: 12.5, end: 15.5, text: "Today I want to tell you three stories from my life.", ar: "اليوم أريد أن أخبركم بثلاث قصص من حياتي." },
            { id: 5, start: 15.5, end: 18.0, text: "That's it. No big deal. Just three stories.", ar: "هذا كل شيء. ليس بالأمر الجلل. مجرد ثلاث قصص." }
        ];

        let activePlayerType = 'html5'; // 'html5' or 'youtube'
        const html5Player = document.getElementById('html5-player');
        let ytPlayer = null;
        
        let currentTime = 0;
        let isPlaying = false;
        let currentSpeed = 1;
        let showTranslation = true;
        let activeTab = 'transcript';
        let currentSubtitleId = null;
        
        let savedLines = [];
        let aiTranslations = {};
        
        try {
            // Safe storage access
            savedLines = JSON.parse(localStorage.getItem('english_studio_saved') || '[]');
            aiTranslations = JSON.parse(localStorage.getItem('english_studio_ai_translations') || '{}');
        } catch (e) {
            console.warn("Local storage disabled. Using session memory.");
        }
        
        let isTranslating = {};
        let loopState = { active: false, subtitleId: null, currentLoops: 0, maxLoops: 3 };

        function saveToStorage(key, data) {
            try { localStorage.setItem(key, JSON.stringify(data)); } catch (e) {}
        }

        // --- YouTube API Integration ---
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('yt-player', {
                height: '100%',
                width: '100%',
                videoId: '', 
                playerVars: {
                    playsinline: 1,
                    controls: 1,
                    rel: 0,
                    modestbranding: 1
                },
                events: {
                    'onStateChange': (event) => {
                        isPlaying = (event.data === YT.PlayerState.PLAYING);
                        document.getElementById('play-pause-btn').innerHTML = isPlaying ? icons.pause : icons.play;
                    }
                }
            });
        };

        // --- Video Event Listeners (HTML5) ---
        html5Player.addEventListener('play', () => {
            if (activePlayerType !== 'html5') return;
            isPlaying = true;
            document.getElementById('play-pause-btn').innerHTML = icons.pause;
        });

        html5Player.addEventListener('pause', () => {
            if (activePlayerType !== 'html5') return;
            isPlaying = false;
            document.getElementById('play-pause-btn').innerHTML = icons.play;
        });

        // Universal Time Tracker
        setInterval(() => {
            if (activePlayerType === 'html5') {
                currentTime = html5Player.currentTime;
            } else if (activePlayerType === 'youtube' && ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
                currentTime = ytPlayer.getCurrentTime();
            }
            handleLoop();
            updateActiveSubtitle();
        }, 100);

        // --- Core Logic ---
        function handleLoop() {
            if (!loopState.active || !loopState.subtitleId) return;
            const targetSub = subtitles.find(s => s.id === loopState.subtitleId);
            if (!targetSub) return;

            if (currentTime >= targetSub.end - 0.1) {
                if (loopState.currentLoops < loopState.maxLoops - 1) {
                    jumpToTime(targetSub.start);
                    loopState.currentLoops++;
                    updateContextControls(targetSub); // Update loop counter UI
                } else {
                    loopState = { active: false, subtitleId: null, currentLoops: 0, maxLoops: 3 };
                    updateContextControls(targetSub);
                }
            }
        }

        function updateActiveSubtitle() {
            const sub = subtitles.find(s => currentTime >= s.start && currentTime <= s.end);
            const newId = sub ? sub.id : null;

            if (newId !== currentSubtitleId) {
                currentSubtitleId = newId;
                renderCurrentSubtitleArea(sub);
                renderTranscript(); // Re-render to highlight correct row
                updateContextControls(sub);
                
                // Scroll into view
                if (newId && activeTab === 'transcript') {
                    const activeEl = document.getElementById(`sub-${newId}`);
                    const container = document.getElementById('sidebar-content');
                    if (activeEl && container) {
                        const offset = activeEl.offsetTop - container.offsetTop - (container.clientHeight / 2) + (activeEl.clientHeight / 2);
                        container.scrollTo({ top: offset, behavior: 'smooth' });
                    }
                }
            }
        }

        // --- Subtitle Parsing (.VTT / .SRT) ---
        function parseSubtitles(text) {
            const lines = text.trim().split(/[\r\n]+/);
            const parsedSubs = [];
            let currentSub = null;
            let idCounter = 1;

            // Regex for 00:00:00.000 or 00:00.000 or 00:00:00,000 (SRT format)
            const timeRegex = /(\d{2}:)?(\d{2}):(\d{2})[.,](\d{3})\s*-->\s*(\d{2}:)?(\d{2}):(\d{2})[.,](\d{3})/;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                // Skip metadata
                if (line === "WEBVTT" || line === "" || /^\d+$/.test(line)) continue; 

                const timeMatch = line.match(timeRegex);
                if (timeMatch) {
                    currentSub = { id: idCounter++, start: 0, end: 0, text: "", ar: "" };
                    
                    // Parse start time
                    const h1 = timeMatch[1] ? parseInt(timeMatch[1]) : 0;
                    const m1 = parseInt(timeMatch[2]);
                    const s1 = parseInt(timeMatch[3]);
                    const ms1 = parseInt(timeMatch[4]);
                    currentSub.start = h1 * 3600 + m1 * 60 + s1 + ms1 / 1000;

                    // Parse end time
                    const h2 = timeMatch[5] ? parseInt(timeMatch[5]) : 0;
                    const m2 = parseInt(timeMatch[6]);
                    const s2 = parseInt(timeMatch[7]);
                    const ms2 = parseInt(timeMatch[8]);
                    currentSub.end = h2 * 3600 + m2 * 60 + s2 + ms2 / 1000;
                    
                    parsedSubs.push(currentSub);
                } else if (currentSub) {
                    // It's text belonging to the cue
                    // Clean HTML tags often found in VTT (e.g. <b>, <i>)
                    const cleanText = line.replace(/<[^>]+>/g, '');
                    if (currentSub.text) currentSub.text += " " + cleanText;
                    else currentSub.text = cleanText;
                }
            }
            return parsedSubs;
        }

        // --- Media Loading Interactions ---
        window.loadYouTubeVideo = function() {
            const url = document.getElementById('youtube-link-input').value;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            
            if (match && match[2].length === 11) {
                // Switch active player
                activePlayerType = 'youtube';
                html5Player.classList.add('hidden');
                document.getElementById('yt-player').classList.remove('hidden');
                
                // Stop HTML5
                html5Player.pause();
                
                if (ytPlayer) {
                    ytPlayer.loadVideoById(match[2]);
                    alert("YouTube video loaded! Don't forget to upload the matching .vtt or .srt subtitles file below.");
                } else {
                    alert("YouTube player is still initializing. Please try again in a moment.");
                }
            } else {
                alert('Please enter a valid YouTube link.');
            }
        };

        window.loadLocalMedia = function() {
            const videoInput = document.getElementById('local-video-upload');
            if (videoInput.files.length > 0) {
                // Switch active player
                activePlayerType = 'html5';
                document.getElementById('yt-player').classList.add('hidden');
                html5Player.classList.remove('hidden');
                
                // Stop YouTube
                if (ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
                
                const fileURL = URL.createObjectURL(videoInput.files[0]);
                html5Player.src = fileURL;
                html5Player.load();
                html5Player.play();
            }
        }

        window.loadSubtitlesFile = function() {
            const vttInput = document.getElementById('local-vtt-upload');
            if (vttInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const text = e.target.result;
                    const newSubs = parseSubtitles(text);
                    if (newSubs.length > 0) {
                        subtitles = newSubs;
                        renderTranscript();
                        alert(`Successfully loaded ${subtitles.length} subtitle cues!`);
                    } else {
                        alert('Could not parse subtitles. Ensure it is a valid .vtt or .srt file.');
                    }
                };
                reader.readAsText(vttInput.files[0]);
            }
        }

        // --- Player Controls (Hybrid) ---
        window.togglePlay = function() {
            if (activePlayerType === 'html5') {
                if (html5Player.paused) html5Player.play();
                else html5Player.pause();
            } else {
                if (!ytPlayer) return;
                if (isPlaying) ytPlayer.pauseVideo();
                else ytPlayer.playVideo();
            }
        }

        window.jumpToTime = function(seconds) {
            if (activePlayerType === 'html5') {
                html5Player.currentTime = seconds;
                html5Player.play();
            } else {
                if (!ytPlayer) return;
                ytPlayer.seekTo(seconds);
                ytPlayer.playVideo();
            }
        }

        window.changeSpeed = function(speed) {
            currentSpeed = speed;
            if (activePlayerType === 'html5') {
                html5Player.playbackRate = speed;
            } else {
                if (ytPlayer && ytPlayer.setPlaybackRate) ytPlayer.setPlaybackRate(speed);
            }
            renderSpeedControls();
        }

        window.startLoop = function(id, maxLoops = 3) {
            const sub = subtitles.find(s => s.id === id);
            if (sub) {
                jumpToTime(sub.start);
                loopState = { active: true, subtitleId: id, currentLoops: 0, maxLoops: maxLoops };
                updateContextControls(sub);
            }
        }

        window.toggleSaveLine = function(id) {
            const sub = subtitles.find(s => s.id === id);
            if (!sub) return;

            const exists = savedLines.find(s => s.id === id);
            if (exists) {
                savedLines = savedLines.filter(s => s.id !== id);
            } else {
                savedLines.push(sub);
            }
            saveToStorage('english_studio_saved', savedLines);
            
            renderTranscript();
            renderRevision();
            updateContextControls(subtitles.find(s => s.id === currentSubtitleId));
            updateRevisionBadge();
        }

        window.toggleTranslation = function() {
            showTranslation = !showTranslation;
            const btn = document.getElementById('toggle-translation-btn');
            if (showTranslation) {
                btn.className = "px-3 py-1.5 rounded-full border transition-colors bg-blue-600/20 border-blue-500 text-blue-400";
            } else {
                btn.className = "px-3 py-1.5 rounded-full border transition-colors bg-slate-800 border-slate-700 text-slate-400 hover:bg-slate-700";
            }
            renderTranscript();
            renderRevision();
            renderCurrentSubtitleArea(subtitles.find(s => s.id === currentSubtitleId));
        }

        window.switchTab = function(tabName) {
            activeTab = tabName;
            
            // Buttons
            const transBtn = document.getElementById('tab-transcript-btn');
            const revBtn = document.getElementById('tab-revision-btn');
            
            if (tabName === 'transcript') {
                transBtn.className = "flex-1 py-3 text-sm font-semibold rounded-lg transition-all bg-slate-800 text-blue-400 shadow-sm border border-slate-700";
                revBtn.className = "flex-1 py-3 text-sm font-semibold rounded-lg transition-all flex items-center justify-center gap-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800/50";
                document.getElementById('tab-transcript').classList.add('active');
                document.getElementById('tab-revision').classList.remove('active');
            } else {
                revBtn.className = "flex-1 py-3 text-sm font-semibold rounded-lg transition-all flex items-center justify-center gap-2 bg-slate-800 text-emerald-400 shadow-sm border border-slate-700";
                transBtn.className = "flex-1 py-3 text-sm font-semibold rounded-lg transition-all text-slate-400 hover:text-slate-200 hover:bg-slate-800/50";
                document.getElementById('tab-revision').classList.add('active');
                document.getElementById('tab-transcript').classList.remove('active');
            }
        }

        window.clearRevision = function() {
            if (confirm("Clear all saved lines?")) {
                savedLines = [];
                saveToStorage('english_studio_saved', savedLines);
                renderTranscript();
                renderRevision();
                updateContextControls(subtitles.find(s => s.id === currentSubtitleId));
                updateRevisionBadge();
            }
        }

        // --- AI Translation ---
        window.translateContextually = async function(id) {
            isTranslating[id] = true;
            renderTranscript();
            renderCurrentSubtitleArea(subtitles.find(s => s.id === currentSubtitleId));

            try {
                const index = subtitles.findIndex(s => s.id === id);
                const current = subtitles[index];
                
                const prevContext = index > 0 ? subtitles[index - 1].text : "";
                const nextContext = index < subtitles.length - 1 ? subtitles[index + 1].text : "";

                const prompt = `Translate the following English subtitle into Arabic.
                Context before: "${prevContext}"
                Target to translate: "${current.text}"
                Context after: "${nextContext}"
                Only return the natural Arabic translation for the Target, nothing else. Do not use quotes in your response.`;

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: "You are an expert English to Arabic translator. Provide accurate, contextual translations suitable for movie subtitles." }] }
                };

                const fetchWithRetry = async (retries = 5) => {
                    const delays = [1000, 2000, 4000, 8000, 16000];
                    for (let i = 0; i < retries; i++) {
                        try {
                            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                            if (!res.ok) throw new Error('API Error');
                            return await res.json();
                        } catch (err) {
                            if (i === retries - 1) throw err;
                            await new Promise(r => setTimeout(r, delays[i]));
                        }
                    }
                };

                const result = await fetchWithRetry();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (text) {
                    aiTranslations[id] = text.trim();
                    saveToStorage('english_studio_ai_translations', aiTranslations);
                }
            } catch (error) {
                console.error("AI Translation failed:", error);
                alert("Translation failed. Please try again.");
            } finally {
                isTranslating[id] = false;
                renderTranscript();
                renderRevision();
                renderCurrentSubtitleArea(subtitles.find(s => s.id === currentSubtitleId));
            }
        }

        // --- Rendering UI ---
        function renderSpeedControls() {
            const speeds = [0.5, 0.75, 1, 1.25];
            const container = document.getElementById('speed-controls');
            container.innerHTML = speeds.map(speed => `
                <button onclick="changeSpeed(${speed})" class="px-3 py-1.5 rounded text-sm font-semibold transition-colors ${currentSpeed === speed ? 'bg-blue-600 text-white shadow' : 'text-slate-300 hover:bg-slate-700'}">
                    ${speed}x
                </button>
            `).join('');
        }

        function updateContextControls(sub) {
            const container = document.getElementById('context-controls');
            if (!sub) {
                container.classList.add('hidden');
                return;
            }
            
            container.classList.remove('hidden');
            const isLooping = loopState.active && loopState.subtitleId === sub.id;
            const isSaved = savedLines.some(s => s.id === sub.id);

            container.innerHTML = `
                <button onclick="startLoop(${sub.id}, 3)" class="flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-colors ${isLooping ? 'bg-amber-500/20 text-amber-400 border border-amber-500/50' : 'bg-slate-800 text-slate-300 hover:bg-slate-700 border border-slate-700'}" title="Automatically repeat this sentence 3 times">
                    ${icons.repeat}
                    ${isLooping ? `Looping (${loopState.currentLoops + 1}/3)` : 'Listen 3x'}
                </button>
                <button onclick="toggleSaveLine(${sub.id})" class="flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-colors border ${isSaved ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-400' : 'bg-slate-800 border-slate-700 text-slate-300 hover:bg-slate-700'}" title="Save to revision list">
                    ${icons.bookmark(isSaved)}
                    ${isSaved ? 'Saved' : 'Save'}
                </button>
            `;
        }

        function renderCurrentSubtitleArea(sub) {
            const container = document.getElementById('current-subtitle-container');
            if (!sub) {
                container.innerHTML = `
                    <div class="text-slate-500 flex flex-col items-center gap-3">
                        ${icons.settings}
                        <p>Play the video to see active subtitles.</p>
                    </div>`;
                return;
            }

            const translationText = aiTranslations[sub.id] || sub.ar;
            let translationHtml = '';
            
            if (showTranslation) {
                if (translationText) {
                    translationHtml = `
                        <p class="text-xl md:text-2xl text-amber-400 font-arabic font-medium leading-relaxed drop-shadow-sm" dir="rtl">
                            ${translationText}
                        </p>
                        <button onclick="translateContextually(${sub.id})" ${isTranslating[sub.id] ? 'disabled' : ''} class="text-xs text-slate-500 hover:text-purple-400 flex items-center justify-center gap-1 transition-colors mt-1 mx-auto" title="Generate a new translation taking surrounding sentences into account">
                            ${isTranslating[sub.id] ? icons.loader : icons.sparkles} AI Enhance
                        </button>
                    `;
                } else {
                    translationHtml = `
                        <button onclick="translateContextually(${sub.id})" ${isTranslating[sub.id] ? 'disabled' : ''} class="text-sm bg-purple-600/20 text-purple-400 border border-purple-500/30 hover:bg-purple-600/40 px-4 py-1.5 rounded-full flex items-center justify-center gap-2 transition-colors disabled:opacity-50 mx-auto mt-2">
                            ${isTranslating[sub.id] ? icons.loader : icons.sparkles}
                            ${isTranslating[sub.id] ? "Translating contextually..." : "Translate with AI Context"}
                        </button>
                    `;
                }
            }

            container.innerHTML = `
                <div class="max-w-3xl space-y-4 animate-[fadeIn_0.3s_ease-in-out]">
                    <p class="text-3xl md:text-4xl font-bold leading-tight text-white tracking-wide drop-shadow-md">
                        ${sub.text}
                    </p>
                    ${translationHtml}
                </div>
            `;
        }

        function renderTranscript() {
            const container = document.getElementById('tab-transcript');
            
            container.innerHTML = subtitles.map(sub => {
                const isActive = currentSubtitleId === sub.id;
                const isSaved = savedLines.some(s => s.id === sub.id);
                const translationText = aiTranslations[sub.id] || sub.ar;

                let translationHtml = '';
                if (showTranslation) {
                    if (translationText) {
                        translationHtml = `<p class="mt-2 text-base font-arabic ${isActive ? 'text-amber-400' : 'text-slate-500'}" dir="rtl">${translationText}</p>`;
                    } else {
                        translationHtml = `
                            <button onclick="event.stopPropagation(); translateContextually(${sub.id})" ${isTranslating[sub.id] ? 'disabled' : ''} class="text-xs text-purple-400 hover:text-purple-300 flex items-center gap-1 mt-1">
                                ${isTranslating[sub.id] ? icons.loader : icons.sparkles} AI Translate
                            </button>
                        `;
                    }
                }

                return `
                    <div id="sub-${sub.id}" onclick="jumpToTime(${sub.start})" class="group relative p-4 rounded-xl border transition-all cursor-pointer ${isActive ? 'bg-blue-900/20 border-blue-500/50 shadow-inner' : 'bg-slate-900 border-slate-800 hover:border-slate-600 hover:bg-slate-800/80'}">
                        
                        <div class="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="event.stopPropagation(); startLoop(${sub.id}, 3);" class="p-2 bg-slate-800 hover:bg-blue-600 text-slate-300 hover:text-white rounded-lg transition-colors border border-slate-700" title="Repeat 3x">
                                ${icons.repeat}
                            </button>
                            <button onclick="event.stopPropagation(); toggleSaveLine(${sub.id});" class="p-2 rounded-lg transition-colors border ${isSaved ? 'bg-emerald-600 text-white border-emerald-500' : 'bg-slate-800 text-slate-300 hover:bg-emerald-600 hover:text-white border-slate-700'}" title="${isSaved ? "Remove" : "Save"}">
                                ${icons.bookmark(isSaved)}
                            </button>
                        </div>

                        <div class="pr-20">
                            <p class="text-lg leading-relaxed ${isActive ? 'text-white font-medium' : 'text-slate-300'}">
                                ${sub.text}
                            </p>
                            ${translationHtml}
                        </div>
                        
                        ${isActive ? `<div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-1/2 bg-blue-500 rounded-r-full"></div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function renderRevision() {
            const container = document.getElementById('tab-revision');
            
            if (savedLines.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-slate-500 mt-20 space-y-4">
                        <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center">
                            ${icons.bookmark(false)}
                        </div>
                        <p class="text-center">Your revision list is empty.<br/>Click the Save button on any subtitle to add it here for practice.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="space-y-4">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg font-semibold text-white">Saved for Practice</h2>
                        <button onclick="clearRevision()" class="text-sm text-red-400 hover:text-red-300 flex items-center gap-1">
                            ${icons.trash} Clear All
                        </button>
                    </div>
                    ${savedLines.map(sub => {
                        const translationText = aiTranslations[sub.id] || sub.ar || "No translation yet";
                        return `
                            <div class="p-5 bg-slate-800/80 rounded-xl border border-slate-700 relative group">
                                <button onclick="toggleSaveLine(${sub.id})" class="absolute top-4 right-4 text-slate-500 hover:text-red-400 transition-colors" title="Remove from list">
                                    ${icons.trash}
                                </button>
                                <p class="text-lg text-white font-medium pr-8 mb-3">${sub.text}</p>
                                <div class="w-full h-px bg-slate-700 my-3"></div>
                                <p class="text-lg text-amber-400 font-arabic text-right mb-4" dir="rtl">${translationText}</p>
                                
                                <div class="flex justify-between items-center mt-4">
                                    <button onclick="jumpToTime(${sub.start}); switchTab('transcript');" class="text-sm text-blue-400 hover:text-blue-300 font-medium flex items-center gap-1">
                                        ${icons.play} Jump to video
                                    </button>
                                    
                                    <button onclick="jumpToTime(${sub.start}); startLoop(${sub.id}, 3); switchTab('transcript');" class="text-sm bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-lg flex items-center gap-2 transition-colors">
                                        ${icons.repeat} Practice (Loop 3x)
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function updateRevisionBadge() {
            const badge = document.getElementById('revision-badge');
            if (savedLines.length > 0) {
                badge.innerText = savedLines.length;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // Initialize UI
        renderSpeedControls();
        renderTranscript();
        renderRevision();
        updateRevisionBadge();

    </script>
</body>
</html>
